name: Flutter Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK split per ABI
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk orbit-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk orbit-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk orbit-x86_64.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            orbit-arm64-v8a.apk
            orbit-armeabi-v7a.apk
            orbit-x86_64.apk