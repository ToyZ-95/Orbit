<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Orbit - Habit Tracker</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HERO -->

    <section class="hero">

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <img src="icon/app.png" class="app-icon">

            <h1>Orbit</h1>

            <p class="tagline">
                Build powerful habits. Stay consistent.
            </p>

            <button id="installBtn" class="install">

                Install for your device

            </button>

            <p id="apkSize"></p>

            <div class="progress">
                <div id="progressBar"></div>
            </div>

        </div>

    </section>


    <!-- SCREENSHOTS -->

    <section class="screenshots">

        <h2>Screenshots</h2>

        <div class="slider">

            <img src="images/screen1.jpg">
            <img src="images/screen2.jpg">
            <img src="images/screen3.jpg">
            <img src="images/screen4.jpg">

        </div>

    </section>


    <!-- CHANGELOG -->

    <section class="updates">

        <h2>What's New</h2>

        <pre id="changelog">
Loading...
</pre>

    </section>


    <!-- FOOTER -->

    <footer>

        <p>
            © Orbit
        </p>

    </footer>

    <script src="app.js"></script>

</body>

</html>
